<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up | UBMarket</title>
  <link rel="stylesheet" href="/assets/css/main.css" />
  <link rel="stylesheet" href="/assets/css/components.css" />
  <link rel="stylesheet" href="/assets/css/responsive.css" />
</head>
<body>
  <header class="header">
    <div class="container header-content">
      <div class="logo"><a href="/"><span class="logo-icon">📚</span><span class="logo-text">UB<span>Market</span></span></a></div>
    </div>
  </header>

  <main class="container auth-page">
    <section class="auth-card">
      <h1>Sign Up</h1>
      <form id="registerForm">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input id="name" type="text" required />
        </div>
        <div class="form-group">
          <label for="email">UB Email</label>
          <input id="email" type="email" required />
        </div>
        <div class="form-group">
          <label for="studentId">Student ID</label>
          <input id="studentId" type="text" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input id="password" type="password" required />
        </div>
        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input id="confirmPassword" type="password" required />
        </div>
        <div class="form-group">
          <button id="submitBtn" class="btn btn-primary">Create Account</button>
        </div>
        <p class="auth-footer">Already have an account? <a href="/pages/login.html">Log In</a></p>
        <p id="errorMessage" class="form-error" style="display:none;"></p>
      </form>
    </section>
  </main>

  <footer class="footer">
    <div class="container footer-bottom">
      <p>&copy; 2026 UBMarket</p>
    </div>
  </footer>

  <script src="/assets/js/app.js"></script>
  <script src="/assets/js/auth.js"></script>
</body>
</html>
