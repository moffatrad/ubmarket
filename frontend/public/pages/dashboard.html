<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard | UBMarket</title>
  <link rel="stylesheet" href="/assets/css/main.css" />
  <link rel="stylesheet" href="/assets/css/components.css" />
  <link rel="stylesheet" href="/assets/css/responsive.css" />
</head>
<body>
  <header class="header" id="mainHeader">
    <div class="container header-content">
      <div class="logo"><a href="/"><span class="logo-icon">📚</span><span class="logo-text">UB<span>Market</span></span></a></div>
      <nav class="nav-links" id="navLinks">
        <a href="/pages/browse.html" class="nav-link">Browse</a>
        <a href="/pages/post.html" class="nav-link">Sell</a>
        <a href="/pages/dashboard.html" class="nav-link">Dashboard</a>
        <a href="/pages/inbox.html" class="nav-link">Messages</a>
      </nav>
      <div class="header-actions">
        <div id="authButtons">
          <a href="/pages/login.html" class="btn btn-outline btn-sm">Log In</a>
          <a href="/pages/register.html" class="btn btn-primary btn-sm">Sign Up</a>
        </div>
        <div id="userMenu" style="display:none;">
          <div class="user-dropdown">
            <button class="user-avatar-btn" id="userAvatarBtn">
              <img src="/assets/img/default-avatar.png" alt="User avatar" id="userAvatar" />
              <span id="userName">User</span>
            </button>
            <div class="dropdown-menu" id="userDropdown">
              <a href="/pages/profile.html">Profile</a>
              <a href="/pages/dashboard.html">Dashboard</a>
              <a href="#" id="logoutBtn">Log Out</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="page-header">
      <h1>Dashboard</h1>
      <p>View your listings, activity, and account overview.</p>
    </section>

    <section class="page-content" id="dashboardPage">
      <div class="empty-state">
        <div class="empty-icon">📊</div>
        <h3>Loading your dashboard...</h3>
        <p>Please wait while we fetch your listing activity.</p>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container footer-bottom">
      <p>&copy; 2026 UBMarket</p>
    </div>
  </footer>

  <script src="/assets/js/app.js"></script>
  <script src="/assets/js/auth.js"></script>
  <script src="/assets/js/listings.js"></script>
</body>
</html>
